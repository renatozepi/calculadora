<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagos por Aula</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    :root {
      --bg: #4f8bd6;
      --navy: #1c3568;
      --yellow: #f4c313;
      --white: #f3f3f3;
      --blue2: #2d65ea;
      --soft: rgba(255,255,255,0.18);
      --namebox: #8fc0ff;
    }

    body {
      margin: 0;
      padding: 24px 18px 20px;
      background: var(--bg);
      color: #1f2937;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
    }

    .topbar {
      position: relative;
      min-height: 90px;
      margin-bottom: 20px;
    }

    .title-block {
      width: 100%;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: 58px;
      line-height: 0.95;
      font-weight: 900;
      color: var(--yellow);
      text-shadow: 0 6px 0 rgba(0,0,0,0.28);
      text-align: center;
    }

    .top-left-box {
      position: absolute;
      top: 0;
      left: 0;
    }

    .top-actions {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mobile-top-boxes,
    .mobile-bottom-actions {
      display: none;
    }

    .global-box,
    .cutoff-box {
      background: var(--soft);
      color: rgb(4, 4, 93);
      border-radius: 20px;
      padding: 10px 16px;
      min-width: 185px;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      backdrop-filter: blur(2px);
    }

    .global-label,
    .cutoff-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
      opacity: 0.95;
      text-align: center;
      width: 100%;
    }

    .global-value,
    .cutoff-value {
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      text-align: center;
      width: 100%;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 800;
    }

    .edit-btn {
      background: #2563eb;
      color: white;
    }

    .save-btn {
      background: #16a34a;
      color: white;
    }

    .add-btn {
      background: #0f766e;
      color: white;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .status {
      font-size: 12px;
      font-weight: 800;
      color: white;
    }

    .hidden {
      display: none !important;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card,
    .view-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb;
    }

    .card-top,
    .view-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .field {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 5px;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    .percent-box,
    .view-percent-box {
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      text-align: center;
    }

    .percent-label,
    .view-percent-label {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .percent-value,
    .view-percent-value {
      font-size: 28px;
      font-weight: 800;
      color: #1d4ed8;
    }

    .bar,
    .view-bar {
      height: 10px;
      width: 100%;
      background: #dbeafe;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .fill,
    .view-fill {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      width: 0%;
      transition: width 0.25s ease;
    }

    .view-data {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .view-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #f9fafb;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 16px;
      color: white;
    }

    .podio-wrap {
      max-width: 860px;
      margin: 0 auto 28px;
    }

    .podio-panel {
      padding: 4px 0 0;
    }

    .podio-stage {
      position: relative;
      width: 100%;
      max-width: 620px;
      height: 300px;
      margin: 0 auto 18px;
    }

    .block {
      position: absolute;
      bottom: 54px;
      background: #213f7f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }

    .block.rank3 {
      left: 9%;
      width: 24%;
      height: 62px;
      border-radius: 22px;
      font-size: 30px;
    }

    .block.rank2 {
      left: 30%;
      width: 24%;
      height: 100px;
      border-radius: 22px 22px 0 0;
      font-size: 42px;
    }

    .block.rank1 {
      left: 51%;
      width: 26%;
      height: 164px;
      border-radius: 22px;
      font-size: 76px;
    }

    .podio-name {
      position: absolute;
      width: 125px;
      text-align: center;
      color: var(--navy);
      font-weight: 900;
      font-size: 22px;
      line-height: 1.05;
      word-break: break-word;
      background: var(--namebox);
      border-radius: 16px;
      padding: 8px 10px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }
    @media (max-width: 700px) {
     .podio-name {
      position: absolute;
      width: 75px;
      text-align: center;
      color: var(--navy);
      font-weight: 900;
      font-size: 22px;
      line-height: 1.05;
      word-break: break-word;
      background: var(--namebox);
      border-radius: 16px;
      padding: 8px 10px;
      margin-bottom: 10px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);}
           .podio-name.name1 {

      margin-bottom: 20px;

    }}

    .name3 { left: 9%; bottom: 132px; }
    .name2 { left: 30%; bottom: 176px; }
    .name1 { left: 52%; bottom: 240px; width: 24%; }

    .podio-meta {
      position: absolute;
      bottom: 0;
      text-align: center;
      color: var(--navy);
      font-weight: 900;
    }

    .podio-meta .pct {
      font-size: 27px;
      line-height: 1;
      margin-bottom: 20px;
    }

    .meta3 { left: 9%; width: 24%; }
    .meta2 { left: 30%; width: 24%; }
    .meta1 { left: 52%; width: 24%; }

    .rest-box {
      background: rgba(255,255,255,0.92);
      border-radius: 34px 34px 0 0;
      max-width: 720px;
      margin: 0 auto;
      padding: 18px 22px 22px 24px;
      color: var(--navy);
    }

    .rest-title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .rest-list {
      display: grid;
      gap: 10px;
    }

    .rest-row {
      display: grid;
      grid-template-columns: 44px 120px 1fr 92px;
      align-items: center;
      gap: 10px;
      font-size: 19px;
      font-weight: 900;
    }

    .rest-rank {
      text-align: left;
    }

    .rest-name {
      text-align: left;
      padding-left: 2px;
    }

    .rest-bar-wrap {
      height: 14px;
      background: rgba(28,53,104,0.14);
      border-radius: 999px;
      overflow: hidden;
      width: 100%;
    }

    .rest-bar {
      height: 100%;
      background: linear-gradient(90deg, #214086, #2d65ea);
      border-radius: 999px;
      width: 0%;
    }

    .rest-pct {
      text-align: right;
    }

    @media (max-width: 1100px) {
      .topbar {
        min-height: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .title-block {
        order: 1;
        margin-bottom: 20px;
      }

      .top-left-box,
      .top-actions {
        position: static;
        width: 100%;
        display: flex;
        justify-content: center;
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 18px 12px 20px;
      }

      .topbar {
        margin-bottom: 14px;
      }

      .top-left-box,
      .top-actions {
        display: none;
      }

      .mobile-top-boxes {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 12px;
      }

      .mobile-bottom-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .title-block {
        width: 100%;
      }

      h1 {
        font-size: 40px;
      }

      .global-box,
      .cutoff-box {
        min-width: 0;
        width: 100%;
        min-height: 66px;
        padding: 10px 12px;
      }

      .global-value,
      .cutoff-value {
        font-size: 28px;
      }

      .podio-stage {
        height: 240px;
        margin-left: 20px;
      }

      .block.rank3 {
        font-size: 22px;
      }

      .block.rank2 {
        font-size: 32px;
      }

      .block.rank1 {
        font-size: 56px;
      }

      .podio-name {
        font-size: 13px;
        padding: 6px 8px;
        border-radius: 12px;
      }

      .name3 { bottom: 118px; }
      .name2 { bottom: 154px; }
      .name1 { bottom: 208px; }

      .podio-meta .pct {
        font-size: 20px;
      }

      .rest-box {
        padding: 16px 14px 20px;
      }

      .rest-row {
        grid-template-columns: 34px 85px 1fr 62px;
        gap: 8px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="mobile-top-boxes">
        <div class="cutoff-box">
          <div class="cutoff-label">Días para el corte</div>
          <div class="cutoff-value" id="diasCorteMobile">0</div>
        </div>
        <div class="global-box">
          <div class="global-label">Pago total</div>
          <div class="global-value" id="totalPagoGeneralMobile">0.0%</div>
        </div>
      </div>

      <div class="top-left-box">
        <div class="cutoff-box">
          <div class="cutoff-label">Días para el corte</div>
          <div class="cutoff-value" id="diasCorte">0</div>
        </div>
      </div>

      <div class="title-block">
        <h1>Salones<br>en el Podio</h1>
      </div>

      <div class="top-actions">
        <div class="global-box">
          <div class="global-label">Pago total</div>
          <div class="global-value" id="totalPagoGeneral">0.0%</div>
        </div>

        <span class="status" id="estado">Conectado</span>
        <button class="edit-btn" id="btnEditar">Editar</button>
        <button class="save-btn hidden" id="btnGuardar">Guardar</button>
        <button class="add-btn hidden" id="btnAgregar">Agregar aula</button>
      </div>
    </div>

    <div id="pantallaVista">
      <div class="podio-wrap">
        <div class="podio-panel">
          <div class="podio-stage" id="podioStage"></div>
          <div class="rest-box">
            <div class="rest-title">Siguientes puestos</div>
            <div class="rest-list" id="restList"></div>
          </div>

          <div class="mobile-bottom-actions">
            <span class="status" id="estadoMobile">Conectado</span>
            <button class="edit-btn" id="btnEditarMobile">Editar</button>
            <button class="save-btn hidden" id="btnGuardarMobile">Guardar</button>
            <button class="add-btn hidden" id="btnAgregarMobile">Agregar aula</button>
          </div>
        </div>
      </div>

      <div>
        <h2 class="section-title">Aulas</h2>
        <div id="vistaGrid" class="grid"></div>
      </div>
    </div>

    <div id="pantallaEdicion" class="hidden">
      <div>
        <h2 class="section-title">Edición</h2>
        <div id="aulasGrid" class="grid"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      deleteDoc,
      onSnapshot,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD19yvqrYVNZxZ8ejLiDUf6zzy2hzmes1g",
      authDomain: "calcprocent.firebaseapp.com",
      projectId: "calcprocent",
      storageBucket: "calcprocent.firebasestorage.app",
      messagingSenderId: "517495178002",
      appId: "1:517495178002:web:29010e7548f305a57fa9cb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const aulasRef = collection(db, "aulas");

    const estado = document.getElementById("estado");
    const estadoMobile = document.getElementById("estadoMobile");
    const grid = document.getElementById("aulasGrid");
    const vistaGrid = document.getElementById("vistaGrid");
    const podioStage = document.getElementById("podioStage");
    const restList = document.getElementById("restList");
    const totalPagoGeneral = document.getElementById("totalPagoGeneral");
    const totalPagoGeneralMobile = document.getElementById("totalPagoGeneralMobile");
    const diasCorte = document.getElementById("diasCorte");
    const diasCorteMobile = document.getElementById("diasCorteMobile");

    const btnEditar = document.getElementById("btnEditar");
    const btnGuardar = document.getElementById("btnGuardar");
    const btnAgregar = document.getElementById("btnAgregar");
    const btnEditarMobile = document.getElementById("btnEditarMobile");
    const btnGuardarMobile = document.getElementById("btnGuardarMobile");
    const btnAgregarMobile = document.getElementById("btnAgregarMobile");

    const pantallaVista = document.getElementById("pantallaVista");
    const pantallaEdicion = document.getElementById("pantallaEdicion");

    let aulas = [];
    let snapshotAulas = [];
    let dirty = false;
    let ignorarSnapshot = false;
    let enEdicion = false;

    function crearId() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function normalizarNumero(valor) {
      if (valor === "" || valor === null || valor === undefined) return 0;
      const n = parseInt(valor, 10);
      return isNaN(n) || n < 0 ? 0 : n;
    }

    function porcentaje(aula) {
      const total = normalizarNumero(aula.total);
      const pagados = Math.min(normalizarNumero(aula.pagados), total);
      if (total <= 0) return 0;
      return Math.min((pagados / total) * 100, 100);
    }

    function porcentajeGeneral(lista) {
      const total = lista.reduce((sum, aula) => sum + normalizarNumero(aula.total), 0);
      const pagados = lista.reduce((sum, aula) => {
        const t = normalizarNumero(aula.total);
        return sum + Math.min(normalizarNumero(aula.pagados), t);
      }, 0);

      if (total <= 0) return 0;
      return (pagados / total) * 100;
    }

    function calcularDiasParaCorte() {
      const hoy = new Date();
      const anio = hoy.getFullYear();
      const mes = hoy.getMonth();
      const dia = hoy.getDate();

      let objetivo;

      if (dia < 3) {
        objetivo = new Date(anio, mes, 3);
      } else if (dia === 3) {
        objetivo = new Date(anio, mes + 1, 3);
      } else {
        objetivo = new Date(anio, mes + 1, 3);
      }

      const inicioHoy = new Date(anio, mes, dia);
      const diferenciaMs = objetivo - inicioHoy;
      return Math.round(diferenciaMs / 86400000);
    }

    function actualizarDiasCorte() {
      const valor = calcularDiasParaCorte();
      diasCorte.textContent = valor;
      diasCorteMobile.textContent = valor;
    }

    function setEstado(texto) {
      estado.textContent = texto;
      estadoMobile.textContent = texto;
    }

    function ordenarLista(lista) {
      return [...lista].sort((a, b) => {
        const diff = porcentaje(b) - porcentaje(a);
        if (diff !== 0) return diff;
        return (a.nombre || "").localeCompare(b.nombre || "", "es");
      });
    }

    function escapeHtml(texto) {
      return String(texto)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setDirty(valor) {
      dirty = valor;
      setEstado(dirty ? "Cambios sin guardar" : "Conectado");
    }

    function setModoEdicion(valor) {
      enEdicion = valor;

      pantallaVista.classList.toggle("hidden", valor);
      pantallaEdicion.classList.toggle("hidden", !valor);

      btnEditar.classList.toggle("hidden", valor);
      btnGuardar.classList.toggle("hidden", !valor);
      btnAgregar.classList.toggle("hidden", !valor);

      btnEditarMobile.classList.toggle("hidden", valor);
      btnGuardarMobile.classList.toggle("hidden", !valor);
      btnAgregarMobile.classList.toggle("hidden", !valor);

      if (valor) {
        renderEdicion();
        setEstado(dirty ? "Cambios sin guardar" : "Editando");
      } else {
        aulas = snapshotAulas.map(a => ({ ...a }));
        dirty = false;
        renderVista();
        setEstado("Conectado");
      }
    }

    function crearCardEdicion(aula, index) {
      const pct = porcentaje(aula);

      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = aula.id;

      card.innerHTML = `
        <div class="card-top">
          <strong class="orden">#${index + 1}</strong>
          <button class="delete-btn" data-action="eliminar" data-id="${aula.id}">Eliminar</button>
        </div>

        <div class="field">
          <label>Nombre aula</label>
          <input type="text" value="${escapeHtml(aula.nombre || "")}" data-campo="nombre" data-id="${aula.id}">
        </div>

        <div class="field">
          <label>Niños total</label>
          <input type="number" min="0" value="${normalizarNumero(aula.total)}" data-campo="total" data-id="${aula.id}">
        </div>

        <div class="field">
          <label>Niños pagan</label>
          <input type="number" min="0" value="${normalizarNumero(aula.pagados)}" data-campo="pagados" data-id="${aula.id}">
        </div>

        <div class="percent-box">
          <div class="percent-label">Porcentaje pago</div>
          <div class="percent-value">${pct.toFixed(1)}%</div>
          <div class="bar">
            <div class="fill" style="width:${pct}%"></div>
          </div>
        </div>
      `;

      return card;
    }

    function crearCardVista(aula, index) {
      const pct = porcentaje(aula);

      const card = document.createElement("div");
      card.className = "view-card";

      card.innerHTML = `
        <div class="view-top">
          <strong>#${index + 1}</strong>
          <strong>${escapeHtml(aula.nombre || "")}</strong>
        </div>

        <div class="view-data">
          <div class="view-row">
            <span>Niños total</span>
            <strong>${normalizarNumero(aula.total)}</strong>
          </div>
          <div class="view-row">
            <span>Niños pagan</span>
            <strong>${Math.min(normalizarNumero(aula.pagados), normalizarNumero(aula.total))}</strong>
          </div>
        </div>

        <div class="view-percent-box">
          <div class="view-percent-label">Porcentaje pago</div>
          <div class="view-percent-value">${pct.toFixed(1)}%</div>
          <div class="view-bar">
            <div class="view-fill" style="width:${pct}%"></div>
          </div>
        </div>
      `;

      return card;
    }

    function renderEdicion() {
      const ordenadas = ordenarLista(aulas);
      grid.innerHTML = "";

      ordenadas.forEach((aula, index) => {
        grid.appendChild(crearCardEdicion(aula, index));
      });
    }

    function renderVista() {
      const ordenadas = ordenarLista(snapshotAulas);
      vistaGrid.innerHTML = "";

      ordenadas.forEach((aula, index) => {
        vistaGrid.appendChild(crearCardVista(aula, index));
      });

      const total = `${porcentajeGeneral(snapshotAulas).toFixed(1)}%`;
      totalPagoGeneral.textContent = total;
      totalPagoGeneralMobile.textContent = total;
      actualizarDiasCorte();
      renderPodioFormato(ordenadas);
    }

    function renderPodioFormato(listaOrdenada) {
      const top3 = [listaOrdenada[2], listaOrdenada[1], listaOrdenada[0]];
      const clases = ["rank3", "rank2", "rank1"];
      const metas = ["meta3", "meta2", "meta1"];
      const names = ["name3", "name2", "name1"];

      podioStage.innerHTML = "";

      top3.forEach((aula, i) => {
        const rankNum = 3 - i;

        const nombre = document.createElement("div");
        nombre.className = `podio-name ${names[i]}`;
        nombre.textContent = aula ? aula.nombre || "" : "";
        podioStage.appendChild(nombre);

        const bloque = document.createElement("div");
        bloque.className = `block ${clases[i]}`;
        bloque.textContent = rankNum;
        podioStage.appendChild(bloque);

        const meta = document.createElement("div");
        meta.className = `podio-meta ${metas[i]}`;
        meta.innerHTML = `
          <div class="pct">${aula ? porcentaje(aula).toFixed(1) : "0.0"}%</div>
        `;
        podioStage.appendChild(meta);
      });

      const restantes = listaOrdenada.slice(3, 7);
      restList.innerHTML = "";

      for (let i = 0; i < 4; i++) {
        const aula = restantes[i];
        const puesto = i + 4;
        const pct = aula ? porcentaje(aula) : 0;

        const row = document.createElement("div");
        row.className = "rest-row";
        row.innerHTML = `
          <div class="rest-rank">${puesto}.</div>
          <div class="rest-name">${aula ? escapeHtml(aula.nombre || "") : ""}</div>
          <div class="rest-bar-wrap">
            <div class="rest-bar" style="width:${pct}%"></div>
          </div>
          <div class="rest-pct">${aula ? `${pct.toFixed(1)}%` : "%"}</div>
        `;
        restList.appendChild(row);
      }
    }

    function actualizarVisualCard(card, aula) {
      const pct = porcentaje(aula);
      const valorPct = card.querySelector(".percent-value");
      const fill = card.querySelector(".fill");

      if (valorPct) valorPct.textContent = `${pct.toFixed(1)}%`;
      if (fill) fill.style.width = `${pct}%`;
    }

    function reordenarDOMEdicion() {
      const ordenadas = ordenarLista(aulas);
      const cards = new Map();

      [...grid.children].forEach(card => {
        cards.set(card.dataset.id, card);
      });

      ordenadas.forEach((aula, index) => {
        const card = cards.get(aula.id);
        if (!card) return;

        const orden = card.querySelector(".orden");
        if (orden) orden.textContent = `#${index + 1}`;
        grid.appendChild(card);
      });
    }

    async function guardarAula(aula) {
      const total = normalizarNumero(aula.total);
      const pagados = Math.min(normalizarNumero(aula.pagados), total);

      const data = {
        id: aula.id,
        nombre: aula.nombre || "",
        total,
        pagados,
        updatedAt: Date.now()
      };

      await setDoc(doc(db, "aulas", aula.id), data);
    }

    async function guardarTodo() {
      try {
        btnGuardar.disabled = true;
        btnGuardarMobile.disabled = true;
        setEstado("Guardando...");
        ignorarSnapshot = true;

        const idsLocales = new Set(aulas.map(a => a.id));
        const snapshot = await getDocs(aulasRef);
        const docsRemotos = snapshot.docs.map(d => d.id);

        for (const aula of aulas) {
          aula.total = normalizarNumero(aula.total);
          aula.pagados = Math.min(normalizarNumero(aula.pagados), aula.total);
          await guardarAula(aula);
        }

        for (const idRemoto of docsRemotos) {
          if (!idsLocales.has(idRemoto)) {
            await deleteDoc(doc(db, "aulas", idRemoto));
          }
        }

        snapshotAulas = aulas.map(a => ({ ...a }));
        renderVista();
        dirty = false;
        setEstado("Guardado");
        setModoEdicion(false);
      } catch {
        setEstado("Error guardando");
      } finally {
        btnGuardar.disabled = false;
        btnGuardarMobile.disabled = false;
        setTimeout(() => {
          ignorarSnapshot = false;
        }, 300);
      }
    }

    function agregarAulaLocal() {
      aulas.push({
        id: crearId(),
        nombre: `Aula ${aulas.length + 1}`,
        total: 0,
        pagados: 0
      });
      renderEdicion();
      setDirty(true);
    }

    function eliminarAulaLocal(id) {
      aulas = aulas.filter(aula => aula.id !== id);
      renderEdicion();
      setDirty(true);
    }

    btnEditar.addEventListener("click", () => {
      aulas = snapshotAulas.map(a => ({ ...a }));
      setModoEdicion(true);
    });

    btnEditarMobile.addEventListener("click", () => {
      aulas = snapshotAulas.map(a => ({ ...a }));
      setModoEdicion(true);
    });

    btnGuardar.addEventListener("click", guardarTodo);
    btnGuardarMobile.addEventListener("click", guardarTodo);

    btnAgregar.addEventListener("click", agregarAulaLocal);
    btnAgregarMobile.addEventListener("click", agregarAulaLocal);

    document.addEventListener("click", (e) => {
      if (!enEdicion) return;
      const btn = e.target.closest("[data-action='eliminar']");
      if (!btn) return;
      eliminarAulaLocal(btn.dataset.id);
    });

    document.addEventListener("input", (e) => {
      if (!enEdicion) return;

      const input = e.target;
      if (input.tagName !== "INPUT") return;

      const id = input.dataset.id;
      const campo = input.dataset.campo;
      if (!id || !campo) return;

      const aula = aulas.find(a => a.id === id);
      if (!aula) return;

      if (campo === "nombre") {
        aula.nombre = input.value;
      } else {
        aula[campo] = normalizarNumero(input.value);

        if (aula.pagados > aula.total) {
          aula.pagados = aula.total;
          const pagadosInput = document.querySelector(`input[data-id="${id}"][data-campo="pagados"]`);
          if (pagadosInput && pagadosInput !== input) {
            pagadosInput.value = aula.pagados;
          }
        }
      }

      const card = input.closest(".card");
      if (card) actualizarVisualCard(card, aula);

      setDirty(true);
    });

    document.addEventListener("change", (e) => {
      if (!enEdicion) return;

      const input = e.target;
      if (input.tagName !== "INPUT") return;

      const id = input.dataset.id;
      const campo = input.dataset.campo;
      if (!id || !campo) return;

      const aula = aulas.find(a => a.id === id);
      if (!aula) return;

      if (campo !== "nombre") {
        input.value = aula[campo];
      }

      const card = input.closest(".card");
      if (card) actualizarVisualCard(card, aula);

      reordenarDOMEdicion();
    });

    onSnapshot(
      aulasRef,
      (snapshot) => {
        if (ignorarSnapshot || enEdicion) return;

        const data = snapshot.docs.map(docSnap => {
          const d = docSnap.data();
          return {
            id: d.id || docSnap.id,
            nombre: d.nombre || "",
            total: normalizarNumero(d.total),
            pagados: normalizarNumero(d.pagados)
          };
        });

        if (data.length === 0) {
          snapshotAulas = [
            { id: crearId(), nombre: "Aula A", total: 20, pagados: 15 },
            { id: crearId(), nombre: "Aula B", total: 18, pagados: 10 },
            { id: crearId(), nombre: "Aula C", total: 25, pagados: 23 }
          ];
          const total = `${porcentajeGeneral(snapshotAulas).toFixed(1)}%`;
          totalPagoGeneral.textContent = total;
          totalPagoGeneralMobile.textContent = total;
          actualizarDiasCorte();
          renderVista();
          setEstado("Sin datos");
          return;
        }

        snapshotAulas = data.map(a => ({ ...a }));
        renderVista();
        setEstado("Conectado");
      },
      () => {
        setEstado("Error conexión");
      }
    );

    actualizarDiasCorte();
  </script>
</body>
</html>
